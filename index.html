<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Kris ❤️</title>

<style>
body{
    margin:0;
    padding:0;
    background: linear-gradient(135deg,#ff758c,#ff7eb3);
    overflow:hidden;
    font-family: Arial, sans-serif;
    text-align:center;
}

/* Pantalla inicial */
#startScreen{
    position:absolute;
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
}

button{
    padding:20px 40px;
    font-size:30px;
    border:none;
    border-radius:50px;
    background:white;
    color:#ff4e88;
    cursor:pointer;
    box-shadow:0 0 20px rgba(255,255,255,0.8);
    transition:0.3s;
}

button:hover{
    transform:scale(1.1);
}

/* Contenido sorpresa */
#content{
    display:none;
    position:absolute;
    width:100%;
    top:20%;
}

/* Título */
h1{
    font-size:60px;
    color:#ff1493;
    text-shadow:
        0 0 10px #ff1493,
        0 0 20px #ff69b4,
        0 0 40px #ff69b4;
}

/* Frases */
#message{
    font-size:30px;
    margin-top:20px;
    min-height:50px;
    color:black; /* AQUÍ están negras */
    font-weight:bold;
    animation: fadeUp 2s ease;
}

/* Animación frases */
@keyframes fadeUp{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* Corazones */
.heart{
    position:absolute;
    color:#ff4d6d;
    font-size:20px;
    animation: float 6s linear infinite;
}

@keyframes float{
    0%{ transform:translateY(100vh); opacity:1; }
    100%{ transform:translateY(-10vh); opacity:0; }
}
</style>
</head>

<body>

<div id="startScreen">
    <button onclick="startSurprise()">Ábreme ❤️</button>
</div>

<div id="content">
    <h1>KRIS MI AMOR 💖</h1>
    <div id="message"></div>
</div>

<audio id="music" loop>
    <source src="Enrique guzmán-Te seguiré(Letra) [SdcTtonXjf4].mp3" type="audio/mpeg">
</audio>

<script>

const messages = [
"TE AMO KRIS ❤️",
"Eres lo mejor que me ha pasado 💕",
"Cada día te amo más 💗",
"Mi persona favorita 💓",
"Eres quien hace sonreír mi corazón 💖"
];

let index = 0;

function startSurprise(){
    document.body.style.background = "#ffffff";
    document.getElementById("startScreen").style.display="none";
    document.getElementById("content").style.display="block";
    document.getElementById("music").play();
    showMessages();
    setInterval(createHeart,300);
}

function showMessages(){
    const messageDiv = document.getElementById("message");
    messageDiv.style.animation = "none";
    void messageDiv.offsetWidth;
    messageDiv.style.animation = "fadeUp 2s ease";
    messageDiv.innerHTML = messages[index];
    index = (index + 1) % messages.length;
    setTimeout(showMessages,3000);
}

function createHeart(){
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML="❤️";
    heart.style.left=Math.random()*100+"vw";
    heart.style.fontSize=(Math.random()*20+15)+"px";
    heart.style.animationDuration=(Math.random()*3+3)+"s";
    document.body.appendChild(heart);

    setTimeout(()=>{heart.remove();},6000);
}

</script>

</body>
</html>
