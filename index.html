<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feliz Día de la Mujer</title>

<style>

body{
margin:0;
padding:0;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
font-family:Arial, sans-serif;
text-align:center;
overflow:hidden;
}

/* Pantalla inicial */

#start{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

button{
padding:20px 40px;
font-size:28px;
border:none;
border-radius:50px;
background:white;
color:#e91e63;
cursor:pointer;
box-shadow:0 0 20px rgba(0,0,0,0.2);
transition:0.3s;
}

button:hover{
transform:scale(1.1);
}

/* Contenido */

#content{
display:none;
margin-top:60px;
}

/* Título */

h1{
font-size:50px;
color:purple;
text-shadow:0 0 15px #c77dff;
}

/* Imagen */

#foto{
width:250px;
height:250px;
object-fit:cover;
border-radius:20px;
margin-top:20px;
box-shadow:0 0 20px rgba(0,0,0,0.3);
}

/* Frases */

#mensaje{
font-size:28px;
margin-top:20px;
color:black;
font-weight:bold;
animation:fade 2s;
}

/* Mensaje final */

#final{
font-size:40px;
color:purple;
margin-top:40px;
display:none;
font-weight:bold;
text-shadow:0 0 20px #c77dff;
}

/* Animación */

@keyframes fade{
from{opacity:0; transform:translateY(20px);}
to{opacity:1; transform:translateY(0);}
}

/* Corazones */

.heart{
position:absolute;
color:#a020f0;
font-size:20px;
animation:float 6s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh); opacity:1;}
100%{transform:translateY(-10vh); opacity:0;}
}

</style>
</head>

<body>

<div id="start">
<button onclick="abrir()">Ver sorpresa 💜</button>
</div>

<div id="content">
<h1>Feliz Día de la Mujer KRIS 💜</h1>

<img id="foto" src="foto1.jpg">

<div id="mensaje"></div>

<div id="final">Feliz Día de la Mujer KRIS 💜<br>Te admiro mucho</div>

</div>

<script>

const frases = [
"Eres una mujer excepcional 🌷",
"Eres una mujer increíble ✨",
"Tu sonrisa es muy encantadora 🌸",
"Eres muy inteligente y maravillosa, tú puedes con todo mi preciosa 💫",
"El mundo es mejor contigo, amor 🌍",
"Gracias por ser la mujer tan especial que eres 💖",
"Estoy muy orgulloso de la mujer que te estás convirtiendo 💜"
];

const fotos = [
"foto1.jpg",
"foto2.jpg",
"foto3.jpg"
];

let i = 0;
let f = 0;

function abrir(){

document.getElementById("start").style.display="none";
document.getElementById("content").style.display="block";

mostrarFrases();

setInterval(crearCorazon,300);

}

function mostrarFrases(){

if(i < frases.length){

const mensaje=document.getElementById("mensaje");
const foto=document.getElementById("foto");

mensaje.style.animation="none";
void mensaje.offsetWidth;
mensaje.style.animation="fade 2s";

mensaje.innerHTML=frases[i];

foto.src = fotos[f];

i++;
f = (f + 1) % fotos.length;

setTimeout(mostrarFrases,3000);

}else{

document.getElementById("mensaje").style.display="none";
document.getElementById("foto").style.display="none";
document.getElementById("final").style.display="block";

}

}

function crearCorazon(){

const heart=document.createElement("div");

heart.classList.add("heart");

heart.innerHTML="💜";

heart.style.left=Math.random()*100+"vw";

heart.style.fontSize=(Math.random()*20+15)+"px";

heart.style.animationDuration=(Math.random()*3+3)+"s";

document.body.appendChild(heart);

setTimeout(()=>{heart.remove()},6000);

}

</script>

</body>
</html>
